name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

jobs:
  release:
    uses: Skiley/rust-binary-publish/.github/workflows/release.yml@v2.0.0
    permissions:
      contents: write
      id-token: write
    with:
      tag: ${{ inputs.tag || github.ref_name }}
      input: |
        {
          "type": "rust-binaries",
          "binary-name": "j18n",
          "crate": "j18n-cli"
        }
      outputs: |
        [
          {
            "type": "github-release"
          },
          {
            "type": "npm-package",
            "package-name": "@j18n/cli",
            "package-description": "j18n CLI — LLM-powered syncing of translated locale files"
          }
        ]
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
